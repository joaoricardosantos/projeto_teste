services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: condo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10

  evolution:
    image: atendai/evolution-api:v1.8.2
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=minha-chave-secreta-evolution
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - QRCODE_LIMIT=30
      - QRCODE_COLOR=#198754
      - DEL_INSTANCE=false
      - STORE_MESSAGES=true
      - STORE_MESSAGE_UP=true
      - STORE_CONTACTS=true
      - STORE_CHATS=true
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    restart: unless-stopped

  web:
    build: .
    working_dir: /app/projeto_disparador
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_NAME=condo_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DJANGO_SECRET_KEY=development-secret-key-change-in-prod
      - DJANGO_DEBUG=True
      - EXTERNAL_MESSAGING_API_URL=http://api.externa.com/v1/send
      - EXTERNAL_MESSAGING_API_KEY=chave_api_aqui
      - EVOLUTION_BASE_URL=http://evolution:8080
      - EVOLUTION_INSTANCE=minha-instancia
      - EVOLUTION_API_KEY=minha-chave-secreta-evolution
    depends_on:
      db:
        condition: service_healthy
      evolution:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    depends_on:
      - web

volumes:
  postgres_data:
  evolution_instances:
  evolution_store:
