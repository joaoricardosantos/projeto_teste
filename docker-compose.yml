services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  web:
    build: .
    working_dir: /app/projeto_disparador
    command: >
      sh -c "python manage.py makemigrations core &&
           python manage.py migrate &&
           python manage.py shell -c \"from core.models import User; User.objects.filter(email='admin@admin.com').exists() or User.objects.create_superuser('admin@admin.com', 'admin123', name='Administrador')\" &&
           gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 1 --worker-class gthread --threads 8 --timeout 600"
    volumes:
      - .:/app
      - ./credentials/google-sheets.json:/app/credentials/google-sheets.json:ro
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - GOOGLE_SHEETS_CREDENTIALS_FILE=/app/credentials/google-sheets.json
      - SHEETS_CACHE_TTL=30
    depends_on:
      - db
      - evolution_api
    networks:
      - app_network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      - web
    networks:
      - app_network

  evolution_api:
    image: atendai/evolution-api:v2.2.3
    container_name: evolution_api
    ports:
      - "8080:8080"
    volumes:
      - evolution_store:/evolution/store
      - ./evolution.env:/evolution/.env
    environment:
      # Servidor
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - SERVER_URL=http://186.202.209.150:8080
      - TZ=America/Sao_Paulo
      - DOCKER_ENV=true
      # Autenticação (v2 usa apenas apikey, JWT removido)
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      # CORS
      - CORS_ORIGIN=*
      - CORS_METHODS=POST,GET,PUT,DELETE
      - CORS_CREDENTIALS=true
      # Logs
      - LOG_LEVEL=ERROR,WARN,DEBUG,INFO,LOG,VERBOSE,DARK,WEBHOOKS
      - LOG_COLOR=true
      - LOG_BAILEYS=error
      # Instâncias
      - DEL_INSTANCE=false
      - QRCODE_LIMIT=30
      # Banco de dados
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:postgres@db:5432/evolution?schema=public
      # Telemetria desativada
      - TELEMETRY=false
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1035194821
    depends_on:
      - db
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  evolution_store: