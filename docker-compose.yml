services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app_network

  web:
    build: .
    working_dir: /app/projeto_disparador
    command: >
      sh -c "python manage.py makemigrations core &&
         python manage.py migrate &&
         python manage.py shell -c \"from core.models import User; User.objects.filter(email='admin@admin.com').exists() or User.objects.create_superuser('admin@admin.com', 'admin123', name='Administrador')\" &&
         gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 1 --worker-class gthread --threads 8 --timeout 600"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - evolution_api
    networks:
      - app_network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      - web
    networks:
      - app_network

  evolution_api:
    image: atendai/evolution-api:v1.8.2
    container_name: evolution_api
    ports:
      - "8080:8080"
    volumes:
      - evolution_store:/evolution/store
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_INSTANCE_MODE=server
      - AUTHENTICATION_JWT_SECRET=L=0YWt]b2w[WF>#>:&E`
      - TZ=America/Sao_Paulo
      - DOCKER_ENV=true
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - SERVER_URL=http://localhost:8080
      - CORS_ORIGIN=*
      - CORS_METHODS=POST,GET,PUT,DELETE
      - CORS_CREDENTIALS=true
      - LOG_LEVEL=ERROR,WARN,DEBUG,INFO,LOG,VERBOSE,DARK,WEBHOOKS
      - LOG_COLOR=true
      - LOG_BAILEYS=error
      - DEL_INSTANCE=false
      - STORE_MESSAGES=true
      - STORE_MESSAGE_UP=true
      - STORE_CONTACTS=true
      - STORE_CHATS=true
      - DATABASE_ENABLED=false
      - WEBHOOK_GLOBAL_ENABLED=false
      - QRCODE_LIMIT=30
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  evolution_store: