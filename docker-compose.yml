services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: condo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  evolution_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: evolution_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data

  evolution:
    image: atendai/evolution-api:latest
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=minha-chave-secreta-evolution
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:postgres@evolution_db:5432/evolution_db
      - DATABASE_CONNECTION_CLIENT_NAME=evolution
      - QRCODE_LIMIT=30
      - DEL_INSTANCE=false
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - evolution_db
    restart: unless-stopped

  web:
    build: .
    working_dir: /app/projeto_disparador
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_NAME=condo_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DJANGO_SECRET_KEY=development-secret-key-change-in-prod
      - DJANGO_DEBUG=True
      - EXTERNAL_MESSAGING_API_URL=http://api.externa.com/v1/send
      - EXTERNAL_MESSAGING_API_KEY=chave_api_aqui
      - EVOLUTION_BASE_URL=http://evolution:8080
      - EVOLUTION_INSTANCE=minha-instancia
      - EVOLUTION_API_KEY=minha-chave-secreta-evolution
    depends_on:
      - db
      - evolution

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    depends_on:
      - web

volumes:
  postgres_data:
  evolution_postgres_data:
  evolution_instances:
